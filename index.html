<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解鎖 AI KLAS 內容自動化變現 SOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-green: #00ea81;
            --deep-blue: #373e98;
            --soft-pink: #ffb6f1;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--deep-blue);
            color: white;
            -webkit-font-smoothing: antialiased;
        }
        .font-heading {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
        }
        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem; 
        }
        .title-line {
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .brand-text {
            letter-spacing: 0.05em;
            background: linear-gradient(to right, #00ea81, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.4em; 
            font-family: 'Montserrat', sans-serif;
        }
        .btn-green {
            background-color: var(--primary-green);
            color: var(--deep-blue);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-green:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 234, 129, 0.4);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 md:p-12 text-center">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-20%] right-[-10%] w-[600px] h-[600px] bg-[#00ea81] opacity-[0.08] blur-[150px] rounded-full"></div>
        <div class="absolute bottom-[-20%] left-[-10%] w-[500px] h-[500px] bg-[#ffb6f1] opacity-[0.08] blur-[150px] rounded-full"></div>
    </div>

    <main class="w-full max-w-3xl">
        <div class="mb-20 pt-10 flex flex-col items-center">
            <div class="title-container">
                <div class="title-line">
                    <span class="brand-text block uppercase">AI KLAS</span>
                </div>
                <div class="title-line text-5xl md:text-7xl text-white">內容自動化</div>
                <div class="title-line text-5xl md:text-7xl text-[#00ea81]">變現 SOP</div>
            </div>
            
            <div class="mt-16 flex justify-center">
                <div class="h-1 w-24 bg-gradient-to-r from-[#00ea81] to-transparent rounded-full opacity-40"></div>
            </div>
            <p class="text-xl md:text-2xl text-gray-400 mt-12 font-light tracking-[0.2em]">
                從 1 到 100 的一人公司運作指南
            </p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-12 mb-14 border border-white/10 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-[#00ea81] tracking-[0.2em] uppercase opacity-90">Creative Director's Logic</h3>
            <p class="text-gray-300 leading-loose text-lg md:text-xl font-light">
                這份 SOP 將 16 年創意總監經驗標準化，拆解如何將原始想法轉化為高價值的內容自動化生產線。
                <span class="block mt-4 text-white font-medium">追蹤我們的 IG 並領取這份完整指南。</span>
            </p>
        </div>

        <div class="space-y-10 max-w-xl mx-auto text-left">
            <!-- 步驟 1 -->
            <div class="group">
                <div class="flex items-center justify-center gap-4 mb-4">
                    <div class="w-10 h-10 rounded-full bg-[#ffb6f1] text-[#373e98] flex items-center justify-center font-black shadow-lg">1</div>
                    <span class="font-bold text-xl tracking-tight text-white">追蹤我們的 Instagram</span>
                </div>
                <a href="https://www.instagram.com/ai.aiklas" target="_blank" onclick="unlockStep()" class="btn-green w-full py-6 rounded-3xl font-black text-2xl flex items-center justify-center gap-4 shadow-xl">
                    <i data-lucide="instagram" class="w-8 h-8"></i> 立即追蹤 @AI_KLAS
                </a>
            </div>

            <!-- 步驟 2 -->
            <div class="relative">
                <div class="flex items-center justify-center gap-4 mb-4">
                    <div class="w-10 h-10 rounded-full bg-[#ffb6f1] opacity-30 text-[#373e98] flex items-center justify-center font-black" id="step-2-num">2</div>
                    <span class="font-bold text-xl text-gray-400 tracking-tight" id="step-2-text">下載變現 SOP 指南</span>
                </div>
                <!-- 修正點：確保 href 與檔案名稱一致 -->
                <a href="ai_klas_sop.pdf" id="download-btn" download="AI_KLAS_SOP.pdf" class="btn-green w-full py-6 rounded-3xl font-black text-2xl flex items-center justify-center gap-4 opacity-20 cursor-not-allowed pointer-events-none grayscale shadow-none">
                    <i data-lucide="download" class="w-8 h-8"></i> 下載 PDF 檔案
                </a>
                <p id="unlock-msg" class="text-sm text-gray-400 mt-4 tracking-widest uppercase text-center">完成步驟 1 後按鈕將自動解鎖</p>
            </div>
        </div>

        <footer class="mt-28 text-gray-600 text-sm font-heading tracking-[0.3em] uppercase">
            <span class="text-[#00ea81] font-bold">Director's Logic × AI Power</span><br>
            <span class="inline-block mt-3 font-black text-white">© 2026 AI KLAS PRESENTS</span>
        </footer>
    </main>

    <script>
        lucide.createIcons();

        function unlockStep() {
            setTimeout(() => {
                const downloadBtn = document.getElementById('download-btn');
                const unlockMsg = document.getElementById('unlock-msg');
                const step2Text = document.getElementById('step-2-text');
                const step2Num = document.getElementById('step-2-num');

                downloadBtn.classList.remove('opacity-20', 'cursor-not-allowed', 'pointer-events-none', 'grayscale');
                downloadBtn.classList.add('animate-pulse');
                
                unlockMsg.innerText = "✨ SUCCESS: CONTENT UNLOCKED";
                unlockMsg.classList.remove('text-gray-400');
                unlockMsg.classList.add('text-[#00ea81]', 'font-bold');
                
                step2Text.classList.remove('text-gray-400');
                step2Text.classList.add('text-white');
                
                step2Num.classList.remove('opacity-30');
                step2Num.style.backgroundColor = '#00ea81';

                const notice = document.createElement('div');
                notice.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#00ea81] text-[#373e98] px-10 py-4 rounded-2xl font-black shadow-2xl z-50 animate-bounce text-lg';
                notice.innerHTML = '已解鎖！請點擊按鈕領取您的 SOP';
                document.body.appendChild(notice);
                setTimeout(() => notice.remove(), 5000);
            }, 1000);
        }
    </script>
</body>
</html>
